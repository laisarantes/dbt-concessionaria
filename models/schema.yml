version: 2

models:
  - name: dim_cliente
    description: "Dimensão de clientes, com dados de endereço."

    columns:
      - name: cliente_id
        description: "Identificador único do cliente."
        data_tests:
          - unique
          - not_null

      - name: nome
        description: "Nome do cliente padronizado."
        data_tests:
          - not_null

      - name: cpf
        description: "CPF contendo apenas números."
        data_tests:
          - unique
          - not_null

      - name: telefone
        description: "Telefone contendo apenas números."

      - name: email
        description: "E-mail padronizado em letras minúsculas."

      - name: status_cliente
        description: "Status do cliente padronizado."
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Ativo
                  - Inativo

      - name: rua
        description: "Nome da rua do endereço do cliente."

      - name: numero
        description: "Número do imóvel."

      - name: bairro
        description: "Bairro padronizado."

      - name: cidade
        description: "Cidade padronizada."

      - name: estado
        description: "Estado padronizado."

      - name: cep
        description: "CEP contendo apenas números."

  - name: dim_loja
    description: "Dimensão de lojas, com dados de endereço."

    columns:
      - name: loja_id
        description: "Identificador único da loja."
        data_tests:
          - unique
          - not_null

      - name: nome
        description: "Nome da loja padronizado."
        data_tests:
          - not_null

      - name: status_loja
        description: "Status da loja padronizado."
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Ativa
                  - Inativa

  - name: dim_fornecedor
    description: "Dimensão de fornecedores, com dados de endereço."

    columns:
      - name: fornecedor_id
        description: "Identificador único do fornecedor."
        data_tests:
          - unique
          - not_null

      - name: nome
        description: "Nome do fornecedor padronizado."
        data_tests:
          - not_null

      - name: status_fornecedor
        description: "Status do fornecedor padronizado."
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Ativo
                  - Inativo

  - name: dim_funcionario
    description: "Dimensão de funcionários, com dados de cargo e loja."

    columns:
      - name: funcionario_id
        description: "Identificador único do funcionário."
        data_tests:
          - unique
          - not_null

      - name: nome
        description: "Nome do funcionário padronizado."
        data_tests:
          - not_null

      - name: cargo
        description: "Nome do cargo do funcionário."

      - name: loja
        description: "Nome da loja do funcionário."

      - name: status_funcionario
        description: "Status do funcionário padronizado."
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Ativo
                  - Inativo

  - name: dim_veiculo
    description: "Dimensão de veículos, com dados de modelo e marca."

    columns:
      - name: veiculo_id
        description: "Identificador único do veículo."
        data_tests:
          - unique
          - not_null

      - name: chassi
        description: "Número do chassi."
        data_tests:
          - unique
          - not_null

      - name: modelo
        description: "Nome do modelo do veículo."

      - name: marca
        description: "Nome da marca do veículo."

      - name: status_veiculo
        description: "Status do veículo."
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Disponível
                  - Vendido
                  - Reservado

      - name: preco
        description: "Preço do veículo."
        data_tests:
          - not_null

  - name: fct_venda
    description: "Fato de vendas realizadas pela concessionária."

    columns:
      - name: venda_id
        description: "Identificador único da venda."
        data_tests:
          - unique
          - not_null

      - name: cliente_id
        description: "Identificador do cliente."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_cliente')
                field: cliente_id

      - name: funcionario_id
        description: "Identificador do funcionário responsável pela venda."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_funcionario')
                field: funcionario_id

      - name: loja_id
        description: "Identificador da loja onde a venda foi realizada."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_loja')
                field: loja_id

      - name: veiculo_id
        description: "Identificador do veículo vendido."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_veiculo')
                field: veiculo_id

      - name: data_venda
        description: "Data em que a venda foi realizada."
        data_tests:
          - not_null

      - name: valor_total
        description: "Valor total da venda."
        data_tests:
          - not_null

      - name: status_venda
        description: "Status da venda padronizado."
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Concluída
                  - Cancelada
                  - Pendente

      - name: categoria_venda
        description: "Categoria da venda com base no valor total (Premium, Intermediária, Popular)."
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Premium
                  - Intermediária
                  - Popular

      - name: trimestre
        description: "Trimestre em que a venda foi realizada, com base na data da venda."
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - 1º Trimestre
                  - 2º Trimestre
                  - 3º Trimestre
                  - 4º Trimestre

  - name: fct_pagamento
    description: "Fato de pagamentos realizados para as vendas."

    columns:
      - name: pagamento_id
        description: "Identificador único do pagamento."
        data_tests:
          - unique
          - not_null

      - name: venda_id
        description: "Identificador da venda relacionada ao pagamento."
        data_tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('fct_venda')
                field: venda_id

      - name: forma_pagamento
        description: "Forma de pagamento padronizada."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Pix
                  - Cartão de Crédito
                  - Financiamento
                  - Boleto
                  - Transferência
                  - Dinheiro

      - name: quantidade_parcelas
        description: "Quantidade de parcelas do pagamento."
        data_tests:
          - not_null

      - name: desconto
        description: "Valor do desconto aplicado na venda."
        data_tests:
          - not_null

      - name: tipo_pagamento
        description: "Classificação do pagamento em à vista ou parcelado."
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - À Vista
                  - Parcelado

      - name: possui_desconto
        description: "Indica se a venda teve desconto aplicado (Sim/Não)."
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Sim
                  - Não

      - name: valor_liquido
        description: "Valor total da venda descontado o valor de desconto aplicado."
        data_tests:
          - not_null

      - name: pagamento_realizado
        description: "Indica se o pagamento já foi realizado (Sim/Não), com base no preenchimento da data de pagamento."
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Sim
                  - Não

      - name: status_pagamento
        description: "Status do pagamento padronizado."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Pago
                  - Pendente
                  - Cancelado

      - name: data_pagamento
        description: "Data em que o pagamento foi realizado."

      - name: data_venda
        description: "Data em que a venda associada foi realizada."
        data_tests:
          - not_null

      - name: valor_total
        description: "Valor total da venda associada."
        data_tests:
          - not_null

      - name: status_venda
        description: "Status da venda associada, padronizado."
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Concluída
                  - Cancelada
                  - Pendente